services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

    networks:
      - cloudshop-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

    networks:
      - cloudshop-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      PORT: ${API_PORT:-3000}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}

      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    expose:
      - "${API_PORT:-3000}"

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/health/ready"
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

    networks:
      - cloudshop-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped

    depends_on:
      api:
        condition: service_healthy

    ports:
      - "${NGINX_PORT:-8080}:80"

    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1"
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - cloudshop-net

volumes:
  postgres-data:

networks:
  cloudshop-net:
    driver: bridge